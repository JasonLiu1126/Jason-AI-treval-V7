<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>JapanGO V9 Offline AI</title>
<meta name="theme-color" content="#111827">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="hero">
  <h1>JapanGO V9 Offline AI</h1>
  <p>離線內建推薦｜GPS附近提示｜必買神物｜智慧交通｜已買不再提醒</p>
</header>

<nav class="topnav">
  <button onclick="go('home')">首頁</button>
  <button onclick="go('ai')">AI附近</button>
  <button onclick="go('smart')">智慧交通</button>
  <button onclick="go('days')">行程</button>
  <button onclick="go('mustbuy')">必買</button>
  <button onclick="go('food')">美食</button>
  <button onclick="go('budget')">預算</button>
</nav>

<main class="wrap">
<section id="home">
  <h2>首頁</h2>
  <div class="card">
    <span class="pill" id="rolePill">角色：Jason</span>
    <span class="pill">V9 Offline AI</span>
    <h3>不接 API 的 AI 推薦</h3>
    <p>資料全部內建在網站裡。到日本現場按「更新定位」，會依你靠近的區域自動提示：附近必買、必吃、交通、已買/未買提醒。</p>
    <div class="btns">
      <button class="btn ghost" onclick="setRole('Jason')">Jason</button>
      <button class="btn ghost" onclick="setRole('太太')">女生</button>
      <button class="btn ghost" onclick="setRole('小孩')">小孩</button>
      <button class="btn map" onclick="locateMe()">更新定位</button>
      <button class="btn blue" onclick="useDemoArea('梅田')">Demo 梅田</button>
      <button class="btn blue" onclick="useDemoArea('銀座')">Demo 銀座</button>
      <button class="btn red" onclick="clearOldCache()">清快取</button>
    </div>
    <p id="gpsStatus" class="small">尚未定位。手機測試可用 Demo；到日本現場用 GPS。</p>
  </div>
  <div id="todayBox"></div>
</section>

<section id="ai">
  <h2>🤖 AI附近推薦</h2>
  <div id="aiBox"></div>
</section>

<section id="smart">
  <h2>🚇 智慧交通</h2>
  <div id="smartBox"></div>
</section>

<section id="days">
  <h2>每日行程</h2>
  <div id="daysList"></div>
</section>

<section id="mustbuy">
  <h2>日本必買資料庫</h2>
  <div class="tabs">
    <button class="tab active" onclick="setBuyTab('all',this)">全部</button>
    <button class="tab" onclick="setBuyTab('Jason',this)">男生</button>
    <button class="tab" onclick="setBuyTab('太太',this)">女生</button>
    <button class="tab" onclick="setBuyTab('小孩',this)">小孩</button>
    <button class="tab" onclick="setBuyTab('limited',this)">日本限定</button>
    <button class="tab" onclick="setBuyTab('bought',this)">已買</button>
  </div>
  <input id="searchBox" placeholder="搜尋：LaBless / ORIHICA / BB / 面膜 / Pokemon" oninput="renderMustBuy()">
  <div id="mustBuyList" class="grid"></div>
</section>

<section id="food">
  <h2>美食推薦</h2>
  <div id="foodList" class="grid"></div>
</section>

<section id="budget">
  <h2>預算 / 行李</h2>
  <div id="budgetBox"></div>
</section>
</main>

<nav class="bottomnav">
  <button onclick="go('home')">🏠<br>首頁</button>
  <button onclick="go('ai')">🤖<br>附近</button>
  <button onclick="go('smart')">🚇<br>交通</button>
  <button onclick="go('mustbuy')">🛍️<br>必買</button>
  <button onclick="go('budget')">💴<br>預算</button>
</nav>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
